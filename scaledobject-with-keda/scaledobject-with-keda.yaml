---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: spring-boot-producer-scaler
  namespace: ordersystem
  annotations:
    scaledobject.keda.sh/transfer-hpa-ownership: "true"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: order-service-folo
  minReplicaCount: 1
  maxReplicaCount: 10
  pollingInterval: 10
  triggers:
  - type: kafka
    metadata:
      bootstrapServers: kafka-with-kraft.kafka.svc.cluster.local:9092
      topic: order-events
      consumerGroup: order-service-group
      lagThreshold: "1"
