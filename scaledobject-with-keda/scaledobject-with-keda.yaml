---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: order-service-monitor
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app: order-service-folo
  namespaceSelector:
    matchNames:
      - ordersystem
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 10s
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: order-service-scaler
  namespace: ordersystem
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: order-service-folo
  minReplicaCount: 1
  maxReplicaCount: 10
  pollingInterval: 10
  cooldownPeriod: 30
  triggers:
    # Kafka Lag Scaling
    - type: kafka
      metadata:
        bootstrapServers: kafka-with-kraft.kafka.svc.cluster.local:9092
        topic: order-events
        consumerGroup: order-service-group
        lagThreshold: "1"
    # HTTP Request Scaling via Prometheus
    - type: prometheus
      metadata:
        serverAddress: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
        metricName: http_requests_total
        query: sum(rate(http_server_requests_seconds_count{kubernetes_namespace="ordersystem",kubernetes_pod_name=~"order-service-folo.*"}[1m]))
        threshold: "20"
