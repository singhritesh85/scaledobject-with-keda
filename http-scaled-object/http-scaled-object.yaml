apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: concurrent-requests-scaler
  namespace: ordersystem
spec:
  scaleTargetRef:
    name: order-service-folo
    kind: Deployment
    apiVersion: apps/v1
    service:  order-service-folo
    port: 80
  replicas:
    min: 1
    max: 10
  scalingMetric:
    concurrency:
      targetValue: 2
  timeouts:
    conditionWait: 30s
  scaledownPeriod: 30
